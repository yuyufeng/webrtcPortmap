<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程终端</title>
    <link rel="stylesheet" href="vendor/xterm.min.css">
    <script src="vendor/xterm.min.js"></script>
    <script src="vendor/xterm-addon-fit.min.js"></script>
    <style>
        html, body { margin: 0; height: 100%; background: #1e1e1e; overflow: hidden; }
        #host { position: absolute; top: 0; left: 0; right: 0; bottom: 0; padding: 4px; box-sizing: border-box; }
        #host.with-banner { top: 34px; }
        #notice { color: #ddd; font-family: -apple-system, sans-serif; padding: 24px; line-height: 1.7; }
        #notice code { background: #333; padding: 2px 6px; border-radius: 4px; }
        #banner {
            display: none; position: absolute; top: 0; left: 0; right: 0; height: 34px;
            align-items: center; gap: 8px; padding: 0 12px;
            background: #b3261e; color: #fff; font: 13px/34px -apple-system, sans-serif;
            box-sizing: border-box; z-index: 10;
        }
        #banner.show { display: flex; }
        #banner .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; flex: 0 0 auto; }
        /* 软键盘（右上角，移动端常用特殊键） */
        .term-softkb { position:absolute; top:8px; right:10px; z-index:20; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
        .term-softkb.with-banner { top:42px; }
        .term-softkb-toggle { background:rgba(45,45,45,.92); color:#ddd; border:1px solid #555; border-radius:6px; padding:5px 10px; cursor:pointer; font-size:15px; line-height:1; }
        .term-softkb-keys { display:flex; flex-wrap:wrap; gap:5px; max-width:248px; justify-content:flex-end; background:rgba(40,40,40,.96); padding:8px; border-radius:8px; border:1px solid #555; box-shadow:0 8px 22px rgba(0,0,0,.45); }
        .term-softkb-keys.hidden { display:none; }
        .term-softkb-keys button { background:#3a3a3a; color:#eee; border:1px solid #5a5a5a; border-radius:6px; padding:8px 10px; font-size:13px; line-height:1; cursor:pointer; min-width:38px; touch-action:manipulation; }
        .term-softkb-keys button:active { background:#4CAF50; border-color:#4CAF50; }
    </style>
</head>
<body>
    <div id="banner"><span class="dot"></span><span id="banner-text"></span></div>
    <div id="host"></div>
    <div class="term-softkb" id="term-softkb" style="display:none;">
        <button class="term-softkb-toggle" id="term-softkb-toggle" title="软键盘（特殊按键）">⌨</button>
        <div class="term-softkb-keys hidden" id="term-softkb-keys"></div>
    </div>
    <script>
    (function () {
        var opener = window.opener;
        if (!opener || opener.closed) {
            document.getElementById('host').outerHTML =
                '<div id="notice">本页面是远程终端的<strong>独立窗口</strong>，需要从主控制台的「🗗 新窗口终端」按钮打开。<br>请回到主控制台点击该按钮。</div>';
            return;
        }
        if (typeof Terminal === 'undefined') {
            document.getElementById('host').outerHTML = '<div id="notice">xterm.js 未加载（vendor 资源缺失）。</div>';
            return;
        }

        var term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: 'Consolas, "Courier New", monospace',
            theme: { background: '#1e1e1e' },
            scrollback: 5000
        });
        var fit = null;
        try { if (window.FitAddon && FitAddon.FitAddon) { fit = new FitAddon.FitAddon(); term.loadAddon(fit); } } catch (e) {}
        term.open(document.getElementById('host'));
        function doFit() { if (fit) { try { fit.fit(); } catch (e) {} } }
        doFit();

        // ===== 断连横幅 =====
        var banner = document.getElementById('banner');
        var bannerText = document.getElementById('banner-text');
        var host = document.getElementById('host');
        var softkb = document.getElementById('term-softkb');
        function showBanner(msg) {
            bannerText.textContent = msg || '连接已断开';
            banner.classList.add('show');
            host.classList.add('with-banner');
            if (softkb) softkb.classList.add('with-banner');
            try { document.title = '⚠ 已断开 - 远程终端'; } catch (e) {}
            doFit();
        }
        function hideBanner() {
            if (!banner.classList.contains('show')) return;
            banner.classList.remove('show');
            host.classList.remove('with-banner');
            if (softkb) softkb.classList.remove('with-banner');
            doFit();
        }

        // ===== opener -> 本窗口：写入输出 / 清屏（回放） / 断连提示 =====
        window.wpWrite = function (b64) {
            hideBanner(); // 有新数据 = 连接正常，撤掉断连提示
            try {
                var bin = atob(b64);
                var arr = new Uint8Array(bin.length);
                for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
                term.write(arr);
            } catch (e) {}
        };
        window.wpReset = function () { hideBanner(); try { term.reset(); } catch (e) {} };
        window.wpSetTitle = function (t) { try { document.title = t; } catch (e) {} };
        // opener 通知连接丢失：顶部红色横幅 + 终端内明确提示。
        window.wpConnectionLost = function (msg) {
            showBanner('⚠ 连接已断开' + (msg ? '：' + msg : '') + ' —— 回主控制台重新连接后本窗口会自动恢复');
            try { term.write('\r\n\x1b[1;31m── 连接已断开' + (msg ? '（' + msg + '）' : '') + ' ──\x1b[0m\r\n\x1b[33m请回到主控制台重新连接，连接恢复后本窗口会自动回放并继续。\x1b[0m\r\n'); } catch (e) {}
        };

        // ===== 软键盘（特殊键，经 opener 发到同一 DataChannel） =====
        (function () {
            var SOFT_KEYS = [
                { label: 'Esc', seq: '\x1b' }, { label: 'Tab', seq: '\t' },
                { label: '^C', seq: '\x03' }, { label: '^L', seq: '\x0c' },
                { label: '⇧Tab', seq: '\x1b[Z' }, { label: '/', seq: '/' },
                { label: '-', seq: '-' }, { label: '|', seq: '|' },
                { label: '↑', seq: '\x1b[A' }, { label: '↓', seq: '\x1b[B' },
                { label: '←', seq: '\x1b[D' }, { label: '→', seq: '\x1b[C' }
            ];
            var box = document.getElementById('term-softkb-keys');
            var toggle = document.getElementById('term-softkb-toggle');
            if (!box || !toggle) return;
            SOFT_KEYS.forEach(function (k) {
                var b = document.createElement('button');
                b.type = 'button'; b.textContent = k.label;
                b.addEventListener('pointerdown', function (e) {
                    e.preventDefault();
                    try { opener.wpPopupInput(k.seq); } catch (x) {}
                    try { term.focus(); } catch (x) {}
                });
                box.appendChild(b);
            });
            toggle.addEventListener('click', function () { box.classList.toggle('hidden'); });
            if (softkb) softkb.style.display = 'flex';
        })();

        // ===== 本窗口 -> opener：键盘输入 / 尺寸 / 关闭 =====
        term.onData(function (d) { try { opener.wpPopupInput(d); } catch (e) {} });
        function reportResize() { doFit(); try { opener.wpPopupResize(term.cols, term.rows); } catch (e) {} }
        window.addEventListener('resize', reportResize);
        window.addEventListener('beforeunload', function () { try { opener.wpPopupClosed(); } catch (e) {} });

        // 主窗口（opener）关闭检测：主窗口没了就无法再通信，明确提示。
        setInterval(function () {
            if (!window.opener || window.opener.closed) {
                showBanner('⚠ 主控制台窗口已关闭，连接中断 —— 请重新打开主控制台');
            }
        }, 2000);

        // 就绪：通知 opener，触发回放并把输出路由到本窗口
        try { opener.wpPopupReady(term.cols, term.rows); } catch (e) {}
        term.focus();
    })();
    </script>
</body>
</html>
